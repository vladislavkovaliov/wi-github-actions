name: 'Get Node.js version'
author: vladislavkovaliov
description: 'Node.js version from package.json'

inputs:
  path:
    description: 'Path to package.json (default: ./package.json)'
    required: false
    default: './package.json'

outputs:
  version:
    description: 'Node.js version from engines.node'
    value: ${{ steps.node-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Read Node.js version from package.json
      id: node-version
      shell: bash
      run: |
        if [ ! -f "${{ inputs.path }}" ]; then
          echo "Error: package.json not found at ${{ inputs.path }}"
          exit 1
        fi
        echo "version=$(node -p "require('${{ inputs.path }}').engines.node")" >> $GITHUB_OUTPUT